<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Grooky</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-base:#060d14;--bg-panel:#0b1622;--bg-card:#0f1f30;
  --border:#0e3d5c;--accent-blue:#1a8fff;--accent-green:#00e5a0;
  --accent-teal:#00c8c8;--accent-red:#ff4e6a;--accent-yellow:#f5c518;
  --glow-blue:rgba(26,143,255,0.25);--glow-green:rgba(0,229,160,0.22);
  --text-primary:#d8f0ff;--text-muted:#4a7a99;--text-dim:#2a5068;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
html{font-size:16px;}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(26,143,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,143,255,0.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent-green),var(--accent-blue),transparent);z-index:100;animation:scanTop 4s ease-in-out infinite alternate;}
@keyframes scanTop{0%{opacity:.4;transform:scaleX(.6);}100%{opacity:1;transform:scaleX(1);}}
header{position:relative;z-index:1;text-align:center;padding:48px 20px 20px;}
.logo-wrap{display:inline-flex;align-items:center;gap:12px;margin-bottom:8px;}
.logo-icon{width:44px;height:44px;}.logo-icon svg{width:100%;height:100%;}
.logo-text{font-family:var(--mono);font-size:2.4rem;font-weight:600;letter-spacing:.16em;background:linear-gradient(135deg,var(--accent-blue) 0%,var(--accent-green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tagline{font-family:var(--mono);font-size:.7rem;letter-spacing:.26em;color:var(--text-muted);text-transform:uppercase;}
main{position:relative;z-index:1;width:min(600px,94vw);margin:0 auto 60px;}

.tabs{display:flex;border-radius:12px 12px 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none;}
.tab-btn{flex:1;padding:13px 20px;background:var(--bg-base);color:var(--text-dim);font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;}
.tab-btn.active{background:var(--bg-panel);color:var(--accent-green);border-bottom:2px solid var(--accent-green);}
.tab-btn:not(.active):hover{color:var(--text-muted);background:rgba(26,143,255,.05);}

.card{background:var(--bg-panel);border:1px solid var(--border);border-radius:0 0 14px 14px;padding:28px 28px 24px;box-shadow:0 0 60px rgba(0,0,0,.5);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-teal) 40%,var(--accent-blue) 60%,transparent);}
.card::after{content:'';position:absolute;bottom:-1px;right:-1px;width:60px;height:60px;border-right:2px solid var(--accent-green);border-bottom:2px solid var(--accent-green);border-radius:0 0 14px 0;opacity:.5;}

.tab-pane{display:none;}.tab-pane.active{display:block;}

/* shared pw-display */
.pw-display{background:var(--bg-base);border:1px solid var(--border);border-radius:8px;padding:18px 16px 18px 28px;display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;overflow:hidden;}
.pw-display::before{content:'//';font-family:var(--mono);font-size:.7rem;color:var(--text-dim);position:absolute;left:8px;top:50%;transform:translateY(-50%);letter-spacing:-.05em;}
.pw-input{flex:1;font-family:var(--mono);font-size:1.05rem;letter-spacing:.07em;background:none;border:none;outline:none;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#pw-output{color:var(--accent-green);caret-color:var(--accent-green);text-shadow:0 0 10px var(--glow-green);}
#checker-input{color:var(--accent-blue);caret-color:var(--accent-blue);}
#checker-input::placeholder{color:var(--text-dim);font-size:.88rem;letter-spacing:.03em;}

.icon-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--text-muted);transition:color .2s,background .2s;display:flex;align-items:center;flex-shrink:0;}
.icon-btn:hover{color:var(--accent-blue);background:rgba(26,143,255,.1);}
.icon-btn svg{width:18px;height:18px;}

/* strength meter */
.strength-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.strength-bars{display:flex;gap:5px;flex:1;}
.strength-bar{flex:1;height:5px;border-radius:99px;background:var(--bg-card);transition:background .4s,box-shadow .4s,transform .2s;}
.strength-bar.on{transform:scaleY(1.4);}
.strength-label-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:72px;}
.strength-label{font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;transition:color .3s;}
.strength-entropy{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);letter-spacing:.08em;}

.section-label{font-family:var(--mono);font-size:.6rem;font-weight:600;letter-spacing:.22em;color:var(--text-dim);text-transform:uppercase;margin-bottom:9px;}

/* length */
.length-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.length-val{font-family:var(--mono);font-size:1.05rem;font-weight:600;color:var(--accent-blue);text-shadow:0 0 10px var(--glow-blue);min-width:32px;text-align:right;}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;background:var(--bg-card);border-radius:99px;outline:none;margin-bottom:24px;cursor:pointer;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent-blue);box-shadow:0 0 12px var(--glow-blue);cursor:pointer;transition:transform .15s;}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.2);}
input[type="range"]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent-blue);border:none;cursor:pointer;}

/* options grid */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:24px;}
.option-item{display:flex;align-items:center;gap:9px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;transition:border-color .2s,background .2s;user-select:none;}
.option-item:hover{border-color:var(--accent-teal);background:rgba(0,200,200,.06);}
.option-item input{display:none;}
.custom-check{width:17px;height:17px;border:1px solid var(--border);border-radius:4px;background:var(--bg-base);display:grid;place-items:center;transition:border-color .2s,background .2s;flex-shrink:0;}
.option-item input:checked ~ .custom-check{border-color:var(--accent-green);background:rgba(0,229,160,.15);}
.custom-check svg{display:none;}
.option-item input:checked ~ .custom-check svg{display:block;}
.option-text{font-size:.83rem;color:var(--text-primary);font-family:var(--sans);}
.option-char{margin-left:auto;font-family:var(--mono);font-size:.7rem;color:var(--text-dim);}

/* exclude */
.exclude-wrap{margin-bottom:24px;}
.exclude-field{width:100%;background:var(--bg-base);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-primary);font-family:var(--mono);font-size:.83rem;outline:none;transition:border-color .2s;}
.exclude-field:focus{border-color:var(--accent-teal);}
.exclude-field::placeholder{color:var(--text-dim);}

/* buttons */
.btn-row{display:grid;grid-template-columns:1fr auto;gap:9px;}
.btn-generate{background:linear-gradient(135deg,#0a5cdd 0%,#007bb5 50%,#00a07a 100%);border:none;border-radius:8px;padding:13px 22px;color:#fff;font-family:var(--sans);font-size:.92rem;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;position:relative;overflow:hidden;transition:opacity .2s,transform .1s;box-shadow:0 0 24px rgba(26,143,255,.25);}
.btn-generate:hover{opacity:.92;transform:translateY(-1px);}
.btn-generate:active{transform:translateY(0);opacity:1;}
.btn-icon{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:13px 14px;color:var(--text-muted);cursor:pointer;transition:color .2s,border-color .2s;display:flex;align-items:center;}
.btn-icon svg{width:20px;height:20px;}
.btn-icon:hover{color:var(--accent-blue);border-color:var(--accent-blue);}

/* history */
.history-panel{margin-top:14px;background:var(--bg-base);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;}
.history-panel.open{display:block;}
.history-header{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border);}
.history-header span{font-family:var(--mono);font-size:.66rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;}
.clear-btn{background:none;border:none;font-family:var(--mono);font-size:.63rem;color:var(--text-dim);cursor:pointer;letter-spacing:.1em;text-transform:uppercase;}
.clear-btn:hover{color:var(--accent-red);}
.history-list{max-height:160px;overflow-y:auto;padding:4px 0;}
.history-list::-webkit-scrollbar{width:3px;}
.history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.history-item{display:flex;align-items:center;padding:8px 15px;gap:10px;cursor:pointer;transition:background .15s;}
.history-item:hover{background:rgba(26,143,255,.07);}
.history-item span{flex:1;font-family:var(--mono);font-size:.8rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-item time{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);flex-shrink:0;}

/* checker */
.checker-empty{text-align:center;padding:28px 0 8px;font-family:var(--mono);font-size:.75rem;color:var(--text-dim);letter-spacing:.1em;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.detail-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;}
.detail-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px;}
.detail-val{font-family:var(--mono);font-size:.98rem;font-weight:600;color:var(--text-primary);}
.tips-box{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;}
.tips-title{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;}
.tip-row{display:flex;align-items:center;gap:9px;padding:4px 0;}
.tip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tip-dot.pass{background:var(--accent-green);}
.tip-dot.fail{background:var(--accent-red);}
.tip-text{font-family:var(--mono);font-size:.73rem;}
.tip-text.pass{color:var(--text-primary);}
.tip-text.fail{color:var(--accent-red);}

/* score ring */
.score-ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.score-ring{width:64px;height:64px;flex-shrink:0;}
.score-info{flex:1;}
.score-verdict{font-family:var(--mono);font-size:1rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.score-sub{font-family:var(--mono);font-size:.65rem;color:var(--text-muted);margin-top:3px;letter-spacing:.08em;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg-panel);border:1px solid var(--accent-green);border-radius:8px;padding:9px 18px;font-family:var(--mono);font-size:.78rem;letter-spacing:.1em;color:var(--accent-green);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{position:relative;z-index:1;text-align:center;padding:0 20px 36px;font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;color:var(--text-dim);}
footer span{color:var(--accent-teal);}

@media(max-width:480px){.options-grid{grid-template-columns:1fr;}.card{padding:20px 16px;}.logo-text{font-size:2rem;}.detail-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="38" height="38" rx="8" stroke="url(#lg1)" stroke-width="1.5"/>
        <path d="M12 22a10 10 0 0 1 10-10" stroke="#1a8fff" stroke-width="2" stroke-linecap="round"/>
        <path d="M32 22a10 10 0 0 1-10 10" stroke="#00e5a0" stroke-width="2" stroke-linecap="round"/>
        <circle cx="22" cy="22" r="3.5" fill="#1a8fff"/>
        <circle cx="22" cy="12" r="2" fill="#00e5a0"/>
        <circle cx="22" cy="32" r="2" fill="#1a8fff"/>
        <circle cx="12" cy="22" r="2" fill="#00c8c8"/>
        <circle cx="32" cy="22" r="2" fill="#00c8c8"/>
        <defs>
          <linearGradient id="lg1" x1="3" y1="3" x2="41" y2="41" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1a8fff"/><stop offset="1" stop-color="#00e5a0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="logo-text">GROOKY</div>
  </div>
  <div class="tagline">Secure Password Generator &amp; Checker</div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-gen" onclick="switchTab('gen')">⚡ Generator</button>
    <button class="tab-btn" id="tab-check" onclick="switchTab('check')">🔍 Strength Checker</button>
  </div>

  <div class="card">

    <!-- ══ GENERATOR ══ -->
    <div class="tab-pane active" id="pane-gen">

      <div class="pw-display">
        <input id="pw-output" class="pw-input" type="text" readonly value="Click generate to start" spellcheck="false"/>
        <button class="icon-btn" id="btn-copy" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="icon-btn" id="btn-eye" title="Show/hide">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="strength-wrap">
        <div class="strength-bars" id="gen-bars">
          <div class="strength-bar" id="gb1"></div><div class="strength-bar" id="gb2"></div>
          <div class="strength-bar" id="gb3"></div><div class="strength-bar" id="gb4"></div>
          <div class="strength-bar" id="gb5"></div>
        </div>
        <div class="strength-label-wrap">
          <div class="strength-label" id="gen-label" style="color:var(--text-dim)">—</div>
          <div class="strength-entropy" id="gen-entropy"></div>
        </div>
      </div>

      <p class="section-label">Password Length</p>
      <div class="length-row">
        <span style="font-size:.8rem;color:var(--text-muted);font-family:var(--mono)">8</span>
        <span class="length-val" id="len-val">16</span>
        <span style="font-size:.8rem;color:var(--text-muted);font-family:var(--mono)">64</span>
      </div>
      <input type="range" id="slider" min="8" max="64" value="16"/>

      <p class="section-label">Character Types</p>
      <div class="options-grid">
        <label class="option-item"><input type="checkbox" id="o-upper" checked/><div class="custom-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="option-text">Uppercase</span><span class="option-char">A–Z</span></label>
        <label class="option-item"><input type="checkbox" id="o-lower" checked/><div class="custom-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="option-text">Lowercase</span><span class="option-char">a–z</span></label>
        <label class="option-item"><input type="checkbox" id="o-nums" checked/><div class="custom-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="option-text">Numbers</span><span class="option-char">0–9</span></label>
        <label class="option-item"><input type="checkbox" id="o-syms" checked/><div class="custom-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="option-text">Symbols</span><span class="option-char">!@#…</span></label>
        <label class="option-item"><input type="checkbox" id="o-ambig"/><div class="custom-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="option-text">Ambiguous</span><span class="option-char">0Ol1</span></label>
        <label class="option-item"><input type="checkbox" id="o-pro"/><div class="custom-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="option-text">Pronounceable</span><span class="option-char">cv</span></label>
      </div>

      <div class="exclude-wrap">
        <p class="section-label">Exclude Characters</p>
        <input class="exclude-field" id="exclude" type="text" placeholder="e.g.  { } [ ] ( )  or any characters to skip"/>
      </div>

      <div class="btn-row">
        <button class="btn-generate" id="btn-gen">⚡ Generate Password</button>
        <button class="btn-icon" id="btn-hist" title="History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.99"/></svg>
        </button>
      </div>

      <div class="history-panel" id="hist-panel">
        <div class="history-header">
          <span>Recent Passwords</span>
          <button class="clear-btn" id="btn-clear">Clear all</button>
        </div>
        <div class="history-list" id="hist-list"></div>
      </div>
    </div>

    <!-- ══ CHECKER ══ -->
    <div class="tab-pane" id="pane-check">

      <div class="pw-display">
        <input id="checker-input" class="pw-input" type="password" placeholder="Type or paste your password here…" spellcheck="false" autocomplete="off"/>
        <button class="icon-btn" id="chk-eye" title="Show/hide" onclick="toggleCheckerEye()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="icon-btn" id="chk-clear-btn" title="Clear" onclick="clearChecker()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div id="chk-empty" class="checker-empty">Start typing to analyze your password</div>

      <div id="chk-result" style="display:none">

        <!-- score ring + verdict -->
        <div class="score-ring-wrap" style="margin-bottom:14px;">
          <svg class="score-ring" viewBox="0 0 64 64" id="ring-svg">
            <circle cx="32" cy="32" r="26" fill="none" stroke="var(--bg-card)" stroke-width="7"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke-width="7" stroke-linecap="round"
              id="ring-arc" stroke-dasharray="163.4" stroke-dashoffset="163.4"
              transform="rotate(-90 32 32)" style="transition:stroke-dashoffset .5s,stroke .4s;"/>
            <text x="32" y="36" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="13" font-weight="600" id="ring-score" fill="#d8f0ff">0</text>
          </svg>
          <div class="score-info">
            <div class="score-verdict" id="chk-verdict" style="color:var(--text-dim)">—</div>
            <div class="score-sub" id="chk-sub"></div>
          </div>
        </div>

        <!-- strength bars -->
        <div class="strength-wrap">
          <div class="strength-bars">
            <div class="strength-bar" id="cb1"></div><div class="strength-bar" id="cb2"></div>
            <div class="strength-bar" id="cb3"></div><div class="strength-bar" id="cb4"></div>
            <div class="strength-bar" id="cb5"></div>
          </div>
          <div class="strength-label-wrap">
            <div class="strength-label" id="chk-label">—</div>
            <div class="strength-entropy" id="chk-entropy"></div>
          </div>
        </div>

        <!-- detail cards -->
        <div class="detail-grid">
          <div class="detail-card"><div class="detail-label">Length</div><div class="detail-val" id="cd-len">—</div></div>
          <div class="detail-card"><div class="detail-label">Entropy</div><div class="detail-val" id="cd-ent">—</div></div>
          <div class="detail-card"><div class="detail-label">Character Pool</div><div class="detail-val" id="cd-pool">—</div></div>
          <div class="detail-card"><div class="detail-label">Est. Crack Time</div><div class="detail-val" id="cd-crack">—</div></div>
        </div>

        <!-- tips checklist -->
        <div class="tips-box">
          <div class="tips-title">Checklist</div>
          <div id="tips-list"></div>
        </div>

      </div>
    </div>

  </div>
</main>

<footer>Built with <span>Grooky</span> · All processing happens locally in your browser</footer>
<div class="toast" id="toast"></div>

<script>
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LOWER='abcdefghijklmnopqrstuvwxyz',NUMS='0123456789',SYMS='!@#$%^&*-_=+[]{}|;:,.<>?',AMBIG='O0Il1',VOWELS='aeiou',CONS='bcdfghjklmnpqrstvwxyz';
const SCFG=[
  {color:'#ff3d5a',glow:'rgba(255,61,90,0.4)',label:'Weak'},
  {color:'#ff7c2a',glow:'rgba(255,124,42,0.38)',label:'Fair'},
  {color:'#f5c518',glow:'rgba(245,197,24,0.36)',label:'Moderate'},
  {color:'#1a8fff',glow:'rgba(26,143,255,0.4)',label:'Strong'},
  {color:'#00e5a0',glow:'rgba(0,229,160,0.4)',label:'Fortress'},
];

let pwHistory=[],genMasked=false,chkMasked=true,lastPw='';

function switchTab(t){
  ['gen','check'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('pane-'+x).classList.toggle('active',x===t);
  });
}

const slider=document.getElementById('slider');
const lenVal=document.getElementById('len-val');
slider.addEventListener('input',()=>{lenVal.textContent=slider.value;fillSlider();});
function fillSlider(){const p=(slider.value-8)/(64-8)*100;slider.style.background=`linear-gradient(90deg,#1a8fff ${p}%,var(--bg-card) ${p}%)`;}
fillSlider();

function opts(){return{len:+slider.value,upper:document.getElementById('o-upper').checked,lower:document.getElementById('o-lower').checked,nums:document.getElementById('o-nums').checked,syms:document.getElementById('o-syms').checked,ambig:document.getElementById('o-ambig').checked,pro:document.getElementById('o-pro').checked,excl:document.getElementById('exclude').value};}

function rand(s){return s[Math.floor(Math.random()*s.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

function filter(set,o){
  let s=set;
  if(!o.ambig)s=s.split('').filter(c=>!AMBIG.includes(c)).join('');
  if(o.excl)s=s.split('').filter(c=>!o.excl.includes(c)).join('');
  return s;
}

function genRandom(o){
  let cs='';
  if(o.upper)cs+=UPPER;if(o.lower)cs+=LOWER;if(o.nums)cs+=NUMS;if(o.syms)cs+=SYMS;
  if(!o.ambig)cs=cs.split('').filter(c=>!AMBIG.includes(c)).join('');
  if(o.excl)cs=cs.split('').filter(c=>!o.excl.includes(c)).join('');
  if(!cs)return'(no valid chars)';
  const g=[];
  if(o.upper&&filter(UPPER,o))g.push(rand(filter(UPPER,o)));
  if(o.lower&&filter(LOWER,o))g.push(rand(filter(LOWER,o)));
  if(o.nums&&filter(NUMS,o))g.push(rand(filter(NUMS,o)));
  if(o.syms&&filter(SYMS,o))g.push(rand(filter(SYMS,o)));
  while(g.length<o.len)g.push(rand(cs));
  return shuffle(g).join('').slice(0,o.len);
}

function genPro(o){
  let r='',i=0;
  while(r.length<o.len){
    let c=(i%2===1)?rand(VOWELS):rand(CONS);
    if(Math.random()<.15&&o.nums)c=rand(NUMS);
    if(o.excl&&o.excl.includes(c))continue;
    if(!o.ambig&&AMBIG.includes(c))continue;
    if(Math.random()<.3&&o.upper)c=c.toUpperCase();
    r+=c;i++;
  }
  return r.slice(0,o.len);
}

function calcEntropy(pw){
  let pool=0;
  if(/[A-Z]/.test(pw))pool+=26;if(/[a-z]/.test(pw))pool+=26;
  if(/[0-9]/.test(pw))pool+=10;if(/[^A-Za-z0-9]/.test(pw))pool+=32;
  return Math.round(pw.length*Math.log2(pool||1));
}

function applyBars(barEls,labelEl,entropyEl,pw){
  let score=0;
  const l=pw.length;
  if(l>=8)score++;if(l>=12)score++;if(l>=16)score++;if(l>=24)score++;
  if(/[A-Z]/.test(pw))score++;if(/[a-z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
  const ent=calcEntropy(pw);
  if(ent>80)score+=2;else if(ent>50)score++;
  const lvl=Math.min(5,Math.max(1,Math.round(score/2.2)));
  const cfg=SCFG[lvl-1];
  barEls.forEach((b,i)=>{
    if(i<lvl){b.style.background=cfg.color;b.style.boxShadow=`0 0 7px ${cfg.glow}`;b.classList.add('on');}
    else{b.style.background='var(--bg-card)';b.style.boxShadow='none';b.classList.remove('on');}
  });
  labelEl.textContent=cfg.label;labelEl.style.color=cfg.color;
  entropyEl.textContent=`~${ent} bits`;
  return{lvl,ent,cfg};
}

function animatePw(target){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
  let f=0;
  const iv=setInterval(()=>{
    if(f>=10){document.getElementById('pw-output').value=target;clearInterval(iv);return;}
    document.getElementById('pw-output').value=target.split('').map((c,i)=>i<f/10*target.length?c:chars[0|Math.random()*chars.length]).join('');
    f++;
  },35);
}

document.getElementById('btn-gen').addEventListener('click',generate);
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('pane-gen').classList.contains('active'))generate();});

function generate(){
  const o=opts();
  if(!o.upper&&!o.lower&&!o.nums&&!o.syms){showToast('Select at least one character type');return;}
  const pw=o.pro?genPro(o):genRandom(o);
  lastPw=pw;genMasked=false;
  setEye('btn-eye',false);
  const out=document.getElementById('pw-output');
  out.type='text';out.value=pw;
  const bars=[1,2,3,4,5].map(i=>document.getElementById('gb'+i));
  applyBars(bars,document.getElementById('gen-label'),document.getElementById('gen-entropy'),pw);
  const now=new Date();
  pwHistory.unshift({pw,time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  if(pwHistory.length>20)pwHistory.pop();
  animatePw(pw);
}

document.getElementById('btn-copy').addEventListener('click',()=>{
  if(!lastPw)return;
  navigator.clipboard.writeText(lastPw).then(()=>showToast('Password copied!'));
});
document.getElementById('btn-eye').addEventListener('click',()=>{
  if(!lastPw)return;
  genMasked=!genMasked;
  document.getElementById('pw-output').type=genMasked?'password':'text';
  setEye('btn-eye',genMasked);
});

document.getElementById('btn-hist').addEventListener('click',()=>{
  const p=document.getElementById('hist-panel');
  p.classList.toggle('open');renderHistory();
});
document.getElementById('btn-clear').addEventListener('click',()=>{pwHistory=[];renderHistory();});

function renderHistory(){
  const list=document.getElementById('hist-list');
  list.innerHTML='';
  if(!pwHistory.length){list.innerHTML='<div style="padding:14px;text-align:center;font-family:var(--mono);font-size:.73rem;color:var(--text-dim)">No passwords yet</div>';return;}
  pwHistory.forEach(h=>{
    const el=document.createElement('div');el.className='history-item';
    el.innerHTML=`<span>${h.pw}</span><time>${h.time}</time>`;
    el.onclick=()=>{lastPw=h.pw;document.getElementById('pw-output').value=h.pw;navigator.clipboard.writeText(h.pw).then(()=>showToast('Copied from history!'));};
    list.appendChild(el);
  });
}

function setEye(id,hide){
  document.getElementById(id).innerHTML=hide
    ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

function toggleCheckerEye(){
  chkMasked=!chkMasked;
  document.getElementById('checker-input').type=chkMasked?'password':'text';
  setEye('chk-eye',!chkMasked);
}
function clearChecker(){
  document.getElementById('checker-input').value='';
  document.getElementById('checker-input').dispatchEvent(new Event('input'));
}

function crackTime(ent){
  const s=Math.pow(2,ent)/1e10;
  if(s<1)return'Instant';
  if(s<60)return Math.round(s)+'s';
  if(s<3600)return Math.round(s/60)+' min';
  if(s<86400)return Math.round(s/3600)+' hrs';
  if(s<31536000)return Math.round(s/86400)+' days';
  if(s<3.15e9)return Math.round(s/31536000)+' yrs';
  if(s<3.15e12)return Math.round(s/3.15e9)+'k yrs';
  if(s<3.15e15)return Math.round(s/3.15e12)+'M yrs';
  return'Heat death era';
}

function scorePercent(lvl){return Math.round(lvl/5*100);}

document.getElementById('checker-input').addEventListener('input',function(){
  const pw=this.value;
  const empty=document.getElementById('chk-empty');
  const result=document.getElementById('chk-result');
  if(!pw){empty.style.display='block';result.style.display='none';return;}
  empty.style.display='none';result.style.display='block';

  const cbars=[1,2,3,4,5].map(i=>document.getElementById('cb'+i));
  const{lvl,ent,cfg}=applyBars(cbars,document.getElementById('chk-label'),document.getElementById('chk-entropy'),pw);

  document.getElementById('chk-verdict').textContent=cfg.label;
  document.getElementById('chk-verdict').style.color=cfg.color;
  document.getElementById('chk-sub').textContent='Password strength assessment';

  const pct=scorePercent(lvl);
  const arc=document.getElementById('ring-arc');
  const circ=163.4;
  arc.style.strokeDashoffset=circ-(circ*pct/100);
  arc.style.stroke=cfg.color;
  document.getElementById('ring-score').textContent=pct;

  let pool=0;
  if(/[A-Z]/.test(pw))pool+=26;if(/[a-z]/.test(pw))pool+=26;
  if(/[0-9]/.test(pw))pool+=10;if(/[^A-Za-z0-9]/.test(pw))pool+=32;

  document.getElementById('cd-len').textContent=pw.length+' chars';
  document.getElementById('cd-ent').textContent='~'+ent+' bits';
  document.getElementById('cd-pool').textContent=pool+' chars';
  document.getElementById('cd-crack').textContent=crackTime(ent);

  const tips=[
    {pass:pw.length>=8,text:'At least 8 characters'},
    {pass:pw.length>=12,text:'At least 12 characters'},
    {pass:pw.length>=16,text:'16+ characters (recommended)'},
    {pass:/[A-Z]/.test(pw),text:'Contains uppercase (A–Z)'},
    {pass:/[a-z]/.test(pw),text:'Contains lowercase (a–z)'},
    {pass:/[0-9]/.test(pw),text:'Contains numbers (0–9)'},
    {pass:/[^A-Za-z0-9]/.test(pw),text:'Contains special symbols'},
    {pass:!/(.)\1{2,}/.test(pw),text:'No repeated character runs (aaa)'},
    {pass:!/^[a-zA-Z]+$/.test(pw),text:'Not letters-only'},
    {pass:!/^[0-9]+$/.test(pw),text:'Not numbers-only'},
    {pass:pw.length<3||!/^(.+)\1+$/.test(pw),text:'No repeating patterns'},
  ];

  document.getElementById('tips-list').innerHTML=tips.map(t=>`
    <div class="tip-row">
      <div class="tip-dot ${t.pass?'pass':'fail'}"></div>
      <span class="tip-text ${t.pass?'pass':'fail'}">${t.text}</span>
    </div>`).join('');
});

let toastTmr;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove('show'),2000);
}

generate();
</script>
</body>
</html>
